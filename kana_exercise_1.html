<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEARNING KANA JAPAN</title>
  <link rel="icon" href="/favicon.svg" type="image/x-icon">
</head>
<body>
  <main id="app">
    <h1>LEARNING WRITE KANA</h1>

    <section class="cards">
      <div class="card" id="hiragana-card">
        <div class="card-title">Mora Hiragana</div>
        <div class="card-romaji" id="hiragana-romaji"></div>
        <div class="card-kana" id="hiragana-kana"></div>
      </div>

      <div class="card" id="katakana-card">
        <div class="card-title">Mora Katakana</div>
        <div class="card-romaji" id="katakana-romaji"></div>
        <div class="card-kana" id="katakana-kana"></div>
      </div>
    </section>

    <div id="hint-area"></div>
    <div id="progress-wrapper">
      <div id="progress-bar"></div>
    </div>
    <button id="action-btn">Reveal</button>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
